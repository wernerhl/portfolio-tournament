name: Monthly Rebalance

on:
  schedule:
    - cron: '0 14 1 * *'   # 1st of month, 10am ET (≈14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance fredapi pandas numpy scipy pyarrow

      - name: Re-score + reselect tiers + rebuild ticker data
        run: |
          python scripts/score_universe.py
          python scripts/select_tiers.py
          python scripts/build_ticker_data.py

      - name: Commit
        run: |
          git config user.name "Tournament Bot"
          git config user.email "bot@tournament"
          git add data/
          git diff --cached --quiet || git commit -m "🔄 Rebalance $(date -u +%Y-%m)"
          git push
